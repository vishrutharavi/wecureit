name: Full Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ 21 ]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven

    - name: Run backend unit tests
      working-directory: ./backend
      run: mvn clean test -DskipITs

    - name: Generate coverage report
      working-directory: ./backend
      run: mvn jacoco:report

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/target/site/jacoco/jacoco.xml
        flags: backend
        fail_ci_if_error: false

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: backend/target/surefire-reports/TEST-*.xml

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: wecureit_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      neo4j:
        image: neo4j:5-enterprise
        env:
          NEO4J_AUTH: neo4j/test_password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        options: >-
          --health-cmd nc -z localhost 7687
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 7687:7687

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Wait for services
      run: |
        echo "Waiting for PostgreSQL..."
        timeout 60 bash -c 'until nc -z localhost 5432; do sleep 2; done'
        echo "Waiting for Neo4j..."
        timeout 60 bash -c 'until nc -z localhost 7687; do sleep 2; done'

    - name: Run backend integration tests
      working-directory: ./backend
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/wecureit_test
        SPRING_DATASOURCE_USERNAME: test_user
        SPRING_DATASOURCE_PASSWORD: test_password
        SPRING_NEO4J_URI: bolt://localhost:7687
        SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
        SPRING_NEO4J_AUTHENTICATION_PASSWORD: test_password
      run: mvn clean verify -DskipUTs

    - name: Upload integration test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: backend/target/failsafe-reports/TEST-*.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [ 18.x ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build
      working-directory: ./frontend
      run: npm run build

    - name: Lint
      working-directory: ./frontend
      run: npm run lint

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-build
        path: frontend/.next

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, frontend-build]
    
    container:
      image: mcr.microsoft.com/playwright:v1.40.1-focal

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: wecureit
          POSTGRES_USER: wecureit_user
          POSTGRES_PASSWORD: wecureit_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5-enterprise
        env:
          NEO4J_AUTH: neo4j/wecureit_graph
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        options: >-
          --health-cmd nc -z localhost 7687
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Start backend
      working-directory: ./backend
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wecureit
        SPRING_DATASOURCE_USERNAME: wecureit_user
        SPRING_DATASOURCE_PASSWORD: wecureit_password
        SPRING_NEO4J_URI: bolt://neo4j:7687
        SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
        SPRING_NEO4J_AUTHENTICATION_PASSWORD: wecureit_graph
      run: |
        mvn clean spring-boot:run &
        sleep 30
        curl -f http://localhost:8080/actuator/health || exit 1

    - name: Start frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
        npm start &
        sleep 10
        curl -f http://localhost:3000 || exit 1

    - name: Run E2E tests
      working-directory: ./e2e
      run: |
        npm ci
        npx playwright test --reporter=html

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 30

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Run SonarQube analysis
      working-directory: ./backend
      run: mvn -B verify sonar:sonar
      continue-on-error: true
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'temurin'
        cache: maven

    - name: Run dependency check
      working-directory: ./backend
      run: mvn org.owasp:dependency-check-maven:check
      continue-on-error: true

    - name: Upload dependency check report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-report
        path: backend/target/dependency-check-report.html

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, e2e-tests]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.backend-unit-tests.result }}" != "success" ] || \
           [ "${{ needs.backend-integration-tests.result }}" != "success" ] || \
           [ "${{ needs.e2e-tests.result }}" != "success" ]; then
          echo "Some tests failed"
          exit 1
        fi
        echo "All tests passed!"

    - name: Create summary
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Backend Unit Tests: ${{ needs.backend-unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Backend Integration Tests: ${{ needs.backend-integration-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- E2E Tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
