# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Firebase
# ===============================
firebase.key-path=/Users/ullasbc/Documents/Projects/wecureit/backend/keys/wecureit-firebase-adminsdk-fbsvc-6f03949d8e.json

# ===============================
# PostgreSQL (Supabase - Transaction Pooler)
# ===============================
spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.nxuerqpbbrtbtqhilawq
spring.datasource.password=wecureit_db

# ===============================
# JPA / Hibernate
# ===============================
# JPA / Hibernate
## During development it's convenient to let Hibernate update the schema.
## Change to 'update' to add missing columns/tables automatically.
## For production, prefer managed migrations (Flyway/Liquibase) and keep this to 'validate' or empty.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Supabase Pooler Compatibility
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ===============================
# Ollama Agent Configuration
# ===============================
ollama.base-url=http://localhost:11434
ollama.model=llama3:latest
ollama.timeout-seconds=30

# ===============================
# Neo4j (Graph Database)
# Set neo4j.enabled=true and remove the autoconfigure.exclude line when Neo4j is running.
# ===============================
neo4j.enabled=true
# spring.autoconfigure.exclude=\
#   org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration,\
#   org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,\
#   org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=wecureit_graph

# ===============================
# Async Thread Pool
# ===============================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=25
spring.task.execution.thread-name-prefix=graph-sync-