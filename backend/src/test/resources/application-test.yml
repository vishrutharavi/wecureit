spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
    
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        
  h2:
    console:
      enabled: true
      
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: test_password
    
logging:
  level:
    com.wecureit: DEBUG
    org.springframework.web: DEBUG
    org.neo4j: INFO
